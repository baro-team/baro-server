spring:
  application:
    name: redispatch-service

server:
  port: ${PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info

kakao:
  mobility:
    base-url: ${KAKAO_MOBILITY_BASE_URL:https://apis-navi.kakaomobility.com}
    api-key: ${KAKAO_MOBILITY_API_KEY:}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

baro:
  openapi:
    title: Redispatch Service API
    description: BARO redispatch-service API documentation
    version: v1

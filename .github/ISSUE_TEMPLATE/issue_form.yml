name: '이슈 생성'
description: '이슈를 생성하며, 생성된 이슈는 Jira와 연동됩니다.'
labels: [order]
body:
  - type: input
    id: parentKey
    attributes:
      label: '상위 작업 Ticket Number'
      description: '상위 작업의 Ticket Number를 기입해주세요'
      placeholder: 'BARO-00'
    validations:
      required: true

  - type: dropdown
    id: workType
    attributes:
      label: '업무 유형'
      description: 'Jira 이슈 유형으로 변환할 업무 유형을 선택해주세요'
      options:
        - feat
        - fix
        - task
    validations:
      required: true


  - type: textarea
    id: details
    attributes:
      label: '이슈 내용(Description)'
      description: '이슈에 대해서 설명해주세요'
      value: |
        - About Details
    validations:
      required: true


  - type: textarea
    id: references
    attributes:
      label: '참조(References)'
      description: '해당 이슈과 관련된 레퍼런스를 참조해주세요'
      value: |
        - Reference1
    validations:
      required: false

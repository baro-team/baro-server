spring:
  application:
    name: control-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

baro:
  openapi:
    title: Control Service API
    description: BARO control-service API documentation
    version: v1

mqtt:
  mode: ${MQTT_MODE:local}   # local | aws
  client-id: control-service
  local:
    host: ${LOCAL_MQTT_HOST:localhost}
    port: ${LOCAL_MQTT_PORT:1883}
  aws:
    endpoint: ${IOT_ENDPOINT:}
    cert-path: ${IOT_CERT_PATH:}
    key-path: ${IOT_KEY_PATH:}
    ca-path: ${IOT_CA_PATH:}

dispatch:
  service:
    url: ${DISPATCH_SERVICE_URL:http://localhost:8082}
